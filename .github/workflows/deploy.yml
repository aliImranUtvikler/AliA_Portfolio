name: Deploy Kobweb to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Download Kobweb CLI
        run: |
          wget https://github.com/varabyte/kobweb/releases/latest/download/kobweb.zip
          unzip kobweb.zip
          # Finding the extracted folder name which looks like kobweb-x.y.z
          KOBWEB_DIR=$(find . -maxdepth 1 -type d -name "kobweb-*" | head -n 1)
          echo "$GITHUB_WORKSPACE/$KOBWEB_DIR/bin" >> $GITHUB_PATH

      - name: Export Kobweb site
        run: kobweb export --notty --layout static
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .kobweb/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
